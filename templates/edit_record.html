<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit record – Worker Records</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            max-width: 480px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: #f8f8f8;
            color: #222;
        }
        h1 { font-size: 1.35rem; margin-bottom: 1rem; color: #333; }
        .nav { margin-bottom: 1rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 4px; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; text-decoration: none; display: inline-block; }
        .btn-save { background: #2563eb; color: #fff; }
        .btn-save:hover { background: #1d4ed8; }
        .btn-cancel { background: #e5e7eb; color: #374151; }
        .btn-cancel:hover { background: #d1d5db; }
        .card {
            background: #fff;
            padding: 1.25rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 1rem;
        }
        label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 0.35rem; color: #555; }
        input {
            width: 100%;
            padding: 0.5rem 0.6rem;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: #2563eb; }
        .errors { background: #fef2f2; color: #b91c1c; padding: 0.5rem 0.75rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.9rem; }
        .errors ul { margin: 0; padding-left: 1.25rem; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="{{ url_for('index') }}" class="btn btn-cancel">← Back to records</a>
    </div>
    <h1>Edit record</h1>
    {% if errors %}
    <div class="errors">
        <ul>
            {% for err in errors %}
            <li>{{ err }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
    <div class="card">
        <form method="post" action="{{ url_for('edit_record', index=index) }}">
            <label for="date">Date</label>
            <input type="date" id="date" name="date" required value="{{ record.date or '' }}">

            <label for="worker_name">Worker Name</label>
            <input type="text" id="worker_name" name="worker_name" required value="{{ record.worker_name or '' }}">

            <label for="time_in">In Time</label>
            <input type="text" id="time_in" name="time_in" required value="{{ record.in_time or '' }}" placeholder="8:00 AM">

            <label for="time_out">Out Time</label>
            <input type="text" id="time_out" name="time_out" required value="{{ record.out_time or '' }}" placeholder="5:00 PM">

            <label for="break_minutes">Break (min)</label>
            <input type="number" id="break_minutes" name="break_minutes" min="0" step="1" value="{{ record.break_minutes or 0 }}">

            <div style="display: flex; gap: 0.5rem;">
                <button type="submit" class="btn btn-save">Save</button>
                <a href="{{ url_for('index') }}" class="btn btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
